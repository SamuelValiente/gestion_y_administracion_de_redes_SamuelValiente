network:
  version: 2
  ethernets:
    enp0s3:
      dhcp4: false
      addresses:
        - 192.168.1.11/24
      routes:
        - to: default
          via: 192.168.1.10
        - to: 10.0.0.0/24
          via: 192.168.1.2
      nameservers:
        addresses: [8.8.8.8, 1.1.1.1]
    lo:
      match:
        name: lo
      addresses:
        - 127.0.0.1/8
        - 192.168.1.20/32