---
# Versión de Zabbix a instalar
zabbix_version: "7.0"

# Base de datos para Zabbix Server
zabbix_db_type: "mysql"
zabbix_db_host: "localhost"
zabbix_db_port: 3306
zabbix_db_name: "zabbix"
zabbix_db_user: "zabbix"
zabbix_db_password: "zabbix_pass"

# Configuración del servidor Zabbix
zabbix_server_host: "10.0.0.14"  # mon01
zabbix_server_port: 10051

# Comunidad SNMP
zabbix_snmp_community: "public"

# Frontend web
zabbix_frontend_port: 80
zabbix_timezone: "Europe/Madrid"
